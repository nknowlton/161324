name: Deploy 161324 GitHub Pages site

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'lectures/lecture10.qmd'
      - 'lectures/lecture11.qmd'
      - 'lectures/lecture12.qmd'
      - 'lectures/lecture11.scss'
      - 'lectures/custom_quarto.css'
      - 'lectures/widgets/**'
      - 'data/**'
      - 'common/*.R'
      - 'labs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libglpk40

      - name: Install R packages
        shell: Rscript {0}
        run: |
          pkgs <- c(
            "tidyverse", "tidymodels", "baguette", "ranger", "xgboost",
            "stacks", "arules", "arulesViz", "cluster", "dbscan", "uwot",
            "arrow", "jsonlite", "vip", "Matrix", "irlba",
            "patchwork", "skimr", "rsample"
          )
          install.packages(pkgs, repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")

      - name: Render reveal lectures
        run: |
          quarto render lectures/lecture10.qmd
          quarto render lectures/lecture11.qmd
          quarto render lectures/lecture12.qmd

      - name: Assemble Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site/notes _site/lectures _site/data _site/labs

          cp -r docs/. _site/notes/
          cp lectures/lecture10.html _site/lectures/lecture10.html
          cp lectures/lecture11.html _site/lectures/lecture11.html
          cp lectures/lecture12.html _site/lectures/lecture12.html
          cp -r lectures/lecture10_files _site/lectures/
          cp -r lectures/lecture11_files _site/lectures/
          cp -r lectures/lecture12_files _site/lectures/
          cp -r lectures/widgets _site/lectures/widgets
          cp -r labs/. _site/labs/

          shopt -s nullglob
          csv_files=(data/*.csv)
          gz_files=(data/*.csv.gz)

          if [ ${#csv_files[@]} -gt 0 ]; then
            for f in "${csv_files[@]}"; do
              gzip -c "$f" > "_site/data/$(basename "$f").gz"
            done
          fi

          if [ ${#gz_files[@]} -gt 0 ]; then
            cp data/*.csv.gz _site/data/
          fi

          cat > _site/lectures/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>161.324 Data Mining - Lectures</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 680px; margin: 3rem auto; padding: 0 1.5rem; color: #222; }
              h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
              p.subtitle { color: #555; margin-top: 0; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.75rem 0; }
              a { color: #197278; font-size: 1.1rem; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .sub { color: #666; font-size: 0.9rem; margin-left: 0.5rem; }
            </style>
          </head>
          <body>
            <h1>161.324 Data Mining</h1>
            <p class="subtitle">Lecture slides</p>
            <ul>
              <li><a href="lecture10.html">Lecture 10</a><span class="sub">Cluster Analysis</span></li>
              <li><a href="lecture11.html">Lecture 11</a><span class="sub">Association Rule Mining</span></li>
              <li><a href="lecture12.html">Lecture 12</a><span class="sub">Ensemble Learning</span></li>
            </ul>
          </body>
          </html>
          EOF

          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>161.324 Data Mining</title>
            <style>
              body {
                font-family: system-ui, sans-serif;
                max-width: 760px;
                margin: 3rem auto;
                padding: 0 1.5rem;
                color: #1f2933;
                line-height: 1.55;
              }
              h1 {
                margin-bottom: 0.25rem;
              }
              p {
                margin-top: 0.25rem;
              }
              ul {
                padding-left: 1.25rem;
              }
              a {
                color: #0f766e;
              }
            </style>
          </head>
          <body>
            <h1>161.324 Data Mining</h1>
            <p>Course materials published from the teaching repository.</p>
            <ul>
              <li><a href="./notes/">Notes</a></li>
              <li><a href="./lectures/">Lectures</a></li>
              <li><a href="./data/">Data</a></li>
              <li><a href="./labs/">Labs</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
