name: Deploy 161324 course content to knowlton.co.nz

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-hub-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hub site rebuild
        env:
          GH_TOKEN: ${{ secrets['324_Deploy_token'] || secrets.HUB_DEPLOY_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Hub deploy token missing; cannot trigger knowlton.co.nz rebuild."
            exit 1
          fi

          gh api repos/nknowlton/nknowlton.github.io/dispatches \
            -f event_type=deploy-course-content
          echo "Hub deploy event triggered."
