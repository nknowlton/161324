name: Deploy 161324 course content to knowlton.co.nz

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-hub-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hub site rebuild
        env:
          GH_TOKEN: ${{ secrets['324_Deploy_token'] || secrets.HUB_DEPLOY_TOKEN }}
        run: |
          gh workflow run deploy.yml --repo nknowlton/nknowlton.github.io --ref master
          echo "Hub deploy workflow triggered."
