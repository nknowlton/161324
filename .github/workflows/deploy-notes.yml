name: Deploy 161324 course content to knowlton.co.nz

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-hub-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hub site rebuild
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets['324_Deploy_token'] || secrets.HUB_DEPLOY_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'nknowlton',
              repo: 'nknowlton.github.io',
              workflow_id: 'deploy.yml',
              ref: 'master'
            });
            console.log('Hub deploy workflow triggered.');
