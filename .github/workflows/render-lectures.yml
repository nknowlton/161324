name: Render lectures 10-12

on:
  push:
    paths:
      - 'lectures/lecture10.qmd'
      - 'lectures/lecture11.qmd'
      - 'lectures/lecture12.qmd'
      - 'lectures/lecture11.scss'
      - 'lectures/custom_quarto.css'
      - 'lectures/widgets/**'
      - 'common/*.R'
      - 'data/longbeach.csv'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libglpk40

      - name: Install R packages
        shell: Rscript {0}
        run: |
          pkgs <- c(
            "tidyverse", "tidymodels", "baguette", "ranger", "xgboost",
            "stacks", "arules", "arulesViz", "cluster", "dbscan", "uwot",
            "arrow", "jsonlite", "vip", "Matrix", "irlba",
            "patchwork", "skimr", "rsample"
          )
          install.packages(pkgs, repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")

      - name: Render lecture 10 (Ensemble Learning)
        run: quarto render lectures/lecture10.qmd -M embed-resources:true

      - name: Render lecture 11 (Cluster Analysis)
        run: quarto render lectures/lecture11.qmd -M embed-resources:true

      - name: Render lecture 12 (Association Rule Mining)
        run: quarto render lectures/lecture12.qmd -M embed-resources:true

      - name: Assemble lectures-html/
        run: |
          mkdir -p lectures-html
          cp lectures/lecture10.html lectures-html/lecture10.html
          cp lectures/lecture11.html lectures-html/lecture11.html
          cp lectures/lecture12.html lectures-html/lecture12.html
          cat > lectures-html/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>161.324 Data Mining – Lectures</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 680px; margin: 3rem auto; padding: 0 1.5rem; color: #222; }
              h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
              p.subtitle { color: #555; margin-top: 0; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.75rem 0; }
              a { color: #197278; font-size: 1.1rem; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .sub { color: #666; font-size: 0.9rem; margin-left: 0.5rem; }
            </style>
          </head>
          <body>
            <h1>161.324 Data Mining</h1>
            <p class="subtitle">Lecture slides</p>
            <ul>
              <li><a href="lecture10.html">Lecture 10</a><span class="sub">Cluster Analysis</span></li>
              <li><a href="lecture11.html">Lecture 11</a><span class="sub">Association Rule Mining</span></li>
              <li><a href="lecture12.html">Lecture 12</a><span class="sub">Ensemble Learning</span></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Commit lectures-html/
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: render lectures 10-12 [skip ci]"
          file_pattern: "lectures-html/**"
